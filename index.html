<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#f472b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="アイプリ管理">
<link rel="manifest" href="manifest.json">
<title>アイプリ所持数管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#fdf2f8;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.topbar{background:#f472b6;padding:12px 16px;display:flex;align-items:center;gap:10px;color:#fff;position:sticky;top:0;z-index:100;min-height:52px}
.topbar .t-back{background:none;border:none;color:#fff;cursor:pointer;padding:4px;font-size:20px;line-height:1;display:flex}
.topbar .t-title{font-size:16px;font-weight:500;flex:1}
.topbar .t-icon{background:none;border:none;color:#fff;cursor:pointer;padding:4px;font-size:20px;line-height:1;display:flex}
.content{flex:1;overflow-y:auto;padding:12px;padding-bottom:72px}
.bottombar{background:#fff;border-top:1px solid #f9a8d4;padding:8px 16px 12px;text-align:center;position:sticky;bottom:0}
.bottombar button{background:none;border:none;cursor:pointer;color:#f472b6;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;margin:0 auto}
.bottombar button i{font-size:22px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1D9E75;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px;color:#f9a8d4}
.spinner{width:32px;height:32px;border:3px solid #fce7f3;border-top-color:#f472b6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fce7f3;border:1px solid #f9a8d4;border-radius:12px;padding:16px;text-align:center;color:#be185d;font-size:14px;margin:16px 0}
.updating-bar{background:#fce7f3;color:#be185d;font-size:11px;text-align:center;padding:4px;display:none}
.updating-bar.show{display:block}
.saving-bar{background:#d1fae5;color:#065f46;font-size:11px;text-align:center;padding:4px;display:none}
.saving-bar.show{display:block}
.dan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dan-card{background:#fff;border:1px solid #f9a8d4;border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.dan-card:active{background:#fce7f3}
.dan-img{aspect-ratio:1;background:#fdf2f8;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dan-img img{width:100%;height:100%;object-fit:cover}
.dan-footer{padding:8px 10px}
.dan-name{font-size:13px;font-weight:600;color:#374151}
.dan-meta{font-size:12px;color:#9ca3af;margin-top:2px}
.pct-bar{height:4px;background:#fce7f3;border-radius:2px;margin-top:6px}
.pct-fill{height:100%;background:#f472b6;border-radius:2px;transition:width 0.4s}
.item-list{display:flex;flex-direction:column;gap:8px}
.item-row{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border:1px solid #f9a8d4;border-radius:14px;cursor:pointer;transition:border-color 0.15s}
.item-row:active{background:#fdf2f8}
.item-row.complete{border-color:#1D9E75;border-width:1.5px}
.item-thumb{width:56px;height:56px;border-radius:10px;background:#fdf2f8;overflow:hidden;flex-shrink:0}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-thumb .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#f9a8d4;font-size:22px}
.item-info{flex:1;min-width:0}
.item-name-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.heart{color:#f472b6;font-size:13px}
.item-iname{font-size:13px;font-weight:500;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.parts-row{display:flex;gap:5px;flex-wrap:wrap}
.part-chip{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.part-chip.zero{background:#fce7f3;color:#be185d}
.part-chip.has{background:#d1fae5;color:#065f46}
.detail-header{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.detail-img{width:160px;height:160px;object-fit:cover;border-radius:16px;border:2px solid #f9a8d4;display:block}
.detail-name{font-size:15px;font-weight:600;color:#f472b6;margin-top:12px;text-align:center;display:flex;align-items:center;gap:6px}
.part-row{display:flex;align-items:center;margin-bottom:12px;gap:12px}
.part-label{font-size:13px;color:#6b7280;width:58px;flex-shrink:0}
.part-label span{color:#f472b6}
.counter{display:flex;align-items:center;flex:1;background:#fdf2f8;border-radius:12px;padding:6px 10px;gap:8px}
.cnt-btn{width:32px;height:32px;border-radius:50%;border:1px solid #f9a8d4;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#f472b6;flex-shrink:0}
.cnt-btn:active{background:#fce7f3}
.cnt-val{flex:1;text-align:center;font-size:18px;font-weight:600;color:#374151}
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <button class="t-back" id="btn-back" style="display:none" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <span class="t-title" id="topbar-title">アイプリ管理</span>
    <button class="t-icon" onclick="reloadCurrent()"><i class="ti ti-refresh"></i></button>
  </div>
  <div class="updating-bar" id="updating-bar">🔄 最新データを取得中...</div>
  <div class="saving-bar" id="saving-bar">💾 保存中...</div>
  <div class="content" id="content"></div>
  <div class="bottombar">
    <button onclick="showHome()"><i class="ti ti-heart"></i>メニュー</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxs8MPNf_Tj0Rbj_lcptS4gDlf9opvBF2UrA21KEjzdbbqsZ_gbI_C7HXj8cfNOAk8jw/exec';
const PARTS = ['アクセ','トップス','ボトムス','シューズ'];
const CACHE_TTL = 60 * 60 * 1000;

let screen = 'home';
let currentDan = null;
let currentItem = null;
let dansCache = null;
let itemsCache = {};
let editCounts = {};

// ---- localStorageキャッシュ ----
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), v: val })); } catch(e) {}
}
function lsGet(key) {
  try {
    const d = JSON.parse(localStorage.getItem(key));
    if (d && Date.now() - d.t < CACHE_TTL) return d.v;
  } catch(e) {}
  return null;
}
function lsDel(key) { try { localStorage.removeItem(key); } catch(e) {} }

// ---- UI helpers ----
function setTitle(t) { document.getElementById('topbar-title').textContent = t; }
function setBack(show) { document.getElementById('btn-back').style.display = show ? '' : 'none'; }
function setContent(html) { document.getElementById('content').innerHTML = html; }
function showUpdating(show) { document.getElementById('updating-bar').classList.toggle('show', show); }
function showSaving(show) { document.getElementById('saving-bar').classList.toggle('show', show); }
function showToast(msg, color='#1D9E75') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- API ----
async function apiGet(params) {
  const res = await fetch(GAS_URL + '?' + new URLSearchParams(params));
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}

// ---- ナビ ----
function showHome() {
  screen = 'home'; currentDan = null; currentItem = null;
  renderHome();
}
function showDan(danId) {
  screen = 'dan'; currentDan = danId; currentItem = null;
  renderDan(danId);
}
function showItem(danId, item) {
  screen = 'item'; currentDan = danId; currentItem = item;
  editCounts = { アクセ: item.アクセ, トップス: item.トップス, ボトムス: item.ボトムス, シューズ: item.シューズ };
  renderItem(item);
}
function goBack() {
  if (screen === 'item') {
    // キャッシュは doAutoSave で更新済みなので再描画だけする
    const dan = currentDan;
    screen = 'dan'; currentDan = dan; currentItem = null;
    setTitle(dan); setBack(true);
    if (itemsCache[dan]) renderItemList(dan);
    else renderDan(dan);
  } else if (screen === 'dan') { showHome(); }
}
function reloadCurrent() {
  if (screen === 'home') { dansCache = null; lsDel('dans'); renderHome(); }
  else if (screen === 'dan') { delete itemsCache[currentDan]; lsDel('items_' + currentDan); showDan(currentDan); }
  else if (screen === 'item') { showItem(currentDan, currentItem); }
}

// ---- 自動保存（+/-タップで即保存） ----
function scheduleAutoSave() {
  doAutoSave();
}

async function doAutoSave() {
  showSaving(true);
  const payload = { action: 'saveItem', dan: currentDan, itemId: currentItem.id, ...editCounts };
  const res = await apiPost(payload).catch(() => null);
  showSaving(false);
  if (res && res.success) {
    // キャッシュ更新
    const cached = itemsCache[currentDan];
    if (cached) {
      const idx = cached.findIndex(i => i.id === currentItem.id);
      if (idx >= 0) { Object.assign(cached[idx], editCounts); lsSet('items_' + currentDan, cached); }
    }
    currentItem = { ...currentItem, ...editCounts };
    dansCache = null; lsDel('dans');
    showToast('✓ 保存しました');
  } else {
    showToast('保存に失敗しました', '#e24b4a');
  }
}

// ---- 所持率を小数1桁に丸める ----
function fmtPct(rate) {
  return Math.round(rate * 10) / 10;
}

// ---- HOME ----
function renderDansGrid() {
  const cards = dansCache.map(d => {
    const pct = fmtPct(d.rate ?? (d.total ? d.owned / d.total * 100 : 0));
    return `<div class="dan-card" onclick="showDan('${d.id}')">
      <div class="dan-img">
        <img src="${d.image||''}" alt="${d.id}" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="dan-footer">
        <div class="dan-name">${d.id}</div>
        <div class="dan-meta">${d.owned ?? 0} / ${d.total ?? 0}（${pct}%）</div>
        <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
  setContent(`<div class="dan-grid">${cards}</div>`);
}

async function renderHome() {
  setTitle('メニュー'); setBack(false);
  if (!dansCache) {
    const cached = lsGet('dans');
    if (cached) {
      dansCache = cached;
      renderDansGrid();
      showUpdating(true);
      apiGet({ action: 'getDans' }).then(res => {
        showUpdating(false);
        if (res && !res.error) { dansCache = res.dans; lsSet('dans', dansCache); if (screen==='home') renderDansGrid(); }
      }).catch(() => showUpdating(false));
      return;
    }
    setContent('<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>');
    const res = await apiGet({ action: 'getDans' }).catch(() => null);
    if (!res || res.error) {
      setContent(`<div class="error-box"><i class="ti ti-alert-circle" style="font-size:24px;display:block;margin-bottom:8px"></i>データを取得できませんでした。<br>GAS URLの設定を確認してください。</div>`);
      return;
    }
    dansCache = res.dans; lsSet('dans', dansCache);
  }
  renderDansGrid();
}

// ---- DAN ----
function renderItemList(danId) {
  const items = itemsCache[danId];
  const rows = items.map(item => {
    const complete = PARTS.every(p => item[p] > 0);
    const chips = PARTS.map(p =>
      `<span class="part-chip ${item[p]>0?'has':'zero'}">${p}: ${item[p]}</span>`
    ).join('');
    return `<div class="item-row ${complete?'complete':''}" onclick="openItem('${danId}','${item.id}')">
      <div class="item-thumb">
        <img src="${item.image||''}" alt="${item.name}" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=no-img><i class=ti ti-photo-off></i></div>'">
      </div>
      <div class="item-info">
        <div class="item-name-row"><span class="heart">♡</span><span class="item-iname">${item.name}</span></div>
        <div class="parts-row">${chips}</div>
      </div>
      <i class="ti ti-chevron-right" style="color:#f9a8d4;font-size:16px;flex-shrink:0"></i>
    </div>`;
  }).join('');
  setContent(`<div class="item-list">${rows}</div>`);
}

async function renderDan(danId) {
  setTitle(danId); setBack(true);
  if (!itemsCache[danId]) {
    const cached = lsGet('items_' + danId);
    if (cached) {
      itemsCache[danId] = cached;
      renderItemList(danId);
      showUpdating(true);
      apiGet({ action: 'getItems', dan: danId }).then(res => {
        showUpdating(false);
        if (res && !res.error) { itemsCache[danId] = res.items; lsSet('items_' + danId, res.items); if (screen==='dan' && currentDan===danId) renderItemList(danId); }
      }).catch(() => showUpdating(false));
      return;
    }
    setContent('<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>');
    const res = await apiGet({ action: 'getItems', dan: danId }).catch(() => null);
    if (!res || res.error) { setContent(`<div class="error-box">データを取得できませんでした。</div>`); return; }
    itemsCache[danId] = res.items; lsSet('items_' + danId, res.items);
  }
  renderItemList(danId);
}

function openItem(danId, itemId) {
  const item = (itemsCache[danId]||[]).find(i => i.id === itemId);
  if (item) showItem(danId, item);
}

// ---- ITEM DETAIL ----
function renderItem(item) {
  setTitle(currentDan); setBack(true);
  const partRows = PARTS.map(p => `
    <div class="part-row">
      <div class="part-label">${p}<span>*</span></div>
      <div class="counter">
        <button class="cnt-btn" onclick="adj('${p}',-1)"><i class="ti ti-minus"></i></button>
        <span class="cnt-val" id="cnt-${p}">${editCounts[p]}</span>
        <button class="cnt-btn" onclick="adj('${p}',1)"><i class="ti ti-plus"></i></button>
      </div>
    </div>`).join('');
  setContent(`
    <div class="detail-header">
      <img class="detail-img" src="${item.image||''}" alt="${item.name}" onerror="this.style.display='none'">
      <div class="detail-name"><span>♡</span>${item.name}</div>
    </div>
    ${partRows}`);
}

function adj(part, delta) {
  editCounts[part] = Math.max(0, (editCounts[part]||0) + delta);
  const el = document.getElementById('cnt-' + part);
  if (el) el.textContent = editCounts[part];
  scheduleAutoSave();
}

// ---- 起動 ----
showHome();
</script>
</body>
</html>
