<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#f472b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="アイプリ管理">
<link rel="manifest" href="manifest.json">
<title>アイプリ所持数管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#fdf2f8;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100dvh;display:flex;flex-direction:column}
.topbar{background:#f472b6;padding:12px 16px;display:flex;align-items:center;gap:10px;color:#fff;position:sticky;top:0;z-index:100;min-height:52px}
.topbar .t-back{background:none;border:none;color:#fff;cursor:pointer;padding:4px;font-size:20px;line-height:1;display:flex}
.topbar .t-title{font-size:16px;font-weight:500;flex:1}
.topbar .t-icon{background:none;border:none;color:#fff;cursor:pointer;padding:4px;font-size:20px;line-height:1;display:flex}
.content{flex:1;overflow-y:auto;padding:12px;padding-bottom:72px;padding-top:8px}
.bottombar{background:#fff;border-top:1px solid #f9a8d4;padding:8px 0 12px;display:flex;justify-content:space-around;position:sticky;bottom:0}
.bottombar button{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 16px}
.bottombar button i{font-size:22px}
.bottombar button.active{color:#f472b6}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1D9E75;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px;color:#f9a8d4}
.spinner{width:32px;height:32px;border:3px solid #fce7f3;border-top-color:#f472b6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fce7f3;border:1px solid #f9a8d4;border-radius:12px;padding:16px;text-align:center;color:#be185d;font-size:14px;margin:16px 0}
.updating-bar{background:#fce7f3;color:#be185d;font-size:11px;text-align:center;padding:4px;display:none}
.updating-bar.show{display:block}
.saving-bar{background:#d1fae5;color:#065f46;font-size:11px;text-align:center;padding:4px;display:none}
.saving-bar.show{display:block}
.search-bar{background:#fff;border-bottom:1px solid #f9a8d4;padding:8px 12px;position:sticky;top:52px;z-index:90}
.search-box{position:relative}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#f9a8d4;font-size:16px;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1px solid #f9a8d4;border-radius:20px;font-size:14px;background:#fdf2f8;outline:none}
.search-input:focus{border-color:#f472b6}
.dan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dan-card{background:#fff;border:1px solid #f9a8d4;border-radius:16px;overflow:hidden;cursor:pointer}
.dan-card:active{background:#fce7f3}
.dan-img{aspect-ratio:1;background:#fdf2f8;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dan-img img{width:100%;height:100%;object-fit:cover}
.dan-footer{padding:8px 10px}
.dan-name{font-size:13px;font-weight:600;color:#374151}
.dan-meta{font-size:12px;color:#9ca3af;margin-top:2px}
.pct-bar{height:4px;background:#fce7f3;border-radius:2px;margin-top:6px}
.pct-fill{height:100%;background:#f472b6;border-radius:2px}
.item-list{display:flex;flex-direction:column;gap:8px}
.item-row{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border:1px solid #f9a8d4;border-radius:14px;cursor:pointer}
.item-row:active{background:#fdf2f8}
.item-row.complete{border-color:#1D9E75;border-width:1.5px}
.item-thumb{width:56px;height:56px;border-radius:10px;background:#fdf2f8;overflow:hidden;flex-shrink:0}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-thumb .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#f9a8d4;font-size:22px}
.item-info{flex:1;min-width:0}
.item-name-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.heart{color:#f472b6;font-size:13px}
.item-iname{font-size:13px;font-weight:500;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.parts-row{display:flex;gap:5px;flex-wrap:wrap}
.part-chip{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.part-chip.zero{background:#fce7f3;color:#be185d}
.part-chip.has{background:#d1fae5;color:#065f46}
.part-chip.extra{background:#fef3c7;color:#92400e}
.detail-header{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.detail-img{width:160px;height:160px;object-fit:cover;border-radius:16px;border:2px solid #f9a8d4;display:block}
.detail-name{font-size:15px;font-weight:600;color:#f472b6;margin-top:12px;text-align:center;display:flex;align-items:center;gap:6px}
.part-row{display:flex;align-items:center;margin-bottom:12px;gap:12px}
.part-label{font-size:13px;color:#6b7280;width:58px;flex-shrink:0}
.part-label span{color:#f472b6}
.counter{display:flex;align-items:center;flex:1;background:#fdf2f8;border-radius:12px;padding:6px 10px;gap:8px}
.cnt-btn{width:32px;height:32px;border-radius:50%;border:1px solid #f9a8d4;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#f472b6;flex-shrink:0}
.cnt-btn:active{background:#fce7f3}
.cnt-val{flex:1;text-align:center;font-size:18px;font-weight:600;color:#374151}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filter-btn{background:#fdf2f8;border:1px solid #f9a8d4;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;white-space:nowrap;color:#374151}
.filter-btn.active{background:#f472b6;color:#fff;border-color:#f472b6}
.trade-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trade-title{font-size:15px;font-weight:600;color:#374151}
.trade-export-btn{background:#f472b6;color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.trade-empty{text-align:center;color:#9ca3af;padding:40px 0;font-size:14px}
.trade-item{display:flex;align-items:center;gap:10px;padding:10px;background:#fff;border:1px solid #fde68a;border-radius:14px;margin-bottom:8px;cursor:pointer}
.trade-item:active{background:#fffbeb}
.trade-thumb{width:56px;height:56px;border-radius:10px;background:#fdf2f8;overflow:hidden;flex-shrink:0}
.trade-thumb img{width:100%;height:100%;object-fit:cover}
.trade-info{flex:1;min-width:0}
.trade-name{font-size:13px;font-weight:500;color:#374151;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trade-dan{font-size:11px;color:#9ca3af;margin-bottom:4px}
.trade-parts{display:flex;gap:4px;flex-wrap:wrap}
.trade-chip{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500;background:#fef3c7;color:#92400e}
/* 画像保存モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:20px;max-width:320px;width:90%;text-align:center}
.modal-box img{width:100%;border-radius:8px;margin-bottom:12px}
.modal-box p{font-size:13px;color:#6b7280;margin-bottom:16px}
.modal-close{background:#f472b6;color:#fff;border:none;border-radius:20px;padding:10px 24px;font-size:14px;cursor:pointer}
.img-preview{display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
.img-preview img{width:100%;border-radius:8px;border:1px solid #f9a8d4}
.img-preview-hint{font-size:13px;color:#6b7280;text-align:center;line-height:1.7;background:#fdf2f8;border-radius:10px;padding:12px 16px;width:100%}
.img-preview-hint strong{color:#f472b6}
</style>
</head>
<body>
<div class="app" id="app-root">
  <div class="topbar">
    <button class="t-back" id="btn-back" style="display:none" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <span class="t-title" id="topbar-title">アイプリ管理</span>
    <button class="t-icon" onclick="reloadCurrent()"><i class="ti ti-refresh"></i></button>
  </div>
  <div class="search-bar" id="search-bar" style="display:none">
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input id="global-search" class="search-input" type="search" placeholder="アイテムを検索...">
    </div>
  </div>
  <div class="updating-bar" id="updating-bar">🔄 最新データを取得中...</div>
  <div class="saving-bar" id="saving-bar">💾 保存中...</div>
  <div class="content" id="content"></div>
  <div class="bottombar">
    <button id="tab-home" class="active" onclick="showHome()"><i class="ti ti-home"></i>ホーム</button>
    <button id="tab-trade" onclick="showTrade()"><i class="ti ti-arrows-exchange"></i>交換リスト</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxs8MPNf_Tj0Rbj_lcptS4gDlf9opvBF2UrA21KEjzdbbqsZ_gbI_C7HXj8cfNOAk8jw/exec';
const PARTS = ['アクセ','トップス','ボトムス','シューズ'];
const CACHE_TTL = 60 * 60 * 1000;

let screen = 'home';
let currentDan = null;
let currentItem = null;
let dansCache = null;
let itemsCache = {};
let editCounts = {};
let isSaving = false;
let savingPromise = null;
let danSearchQuery = '';   // 弾リスト内検索
let homeSearchQuery = '';  // ホーム全検索
let tradeFilter = 'all';   // 交換リストの弾フィルター

function normalize(str) {
  return (str||'').replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60)).toLowerCase();
}

// ---- localStorage ----
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify({t:Date.now(),v}))}catch(e){}}
function lsGet(k){try{const d=JSON.parse(localStorage.getItem(k));if(d&&Date.now()-d.t<CACHE_TTL)return d.v}catch(e){}return null}
function lsDel(k){try{localStorage.removeItem(k)}catch(e){}}

// ---- UI ----
function setTitle(t){document.getElementById('topbar-title').textContent=t}
function setBack(show){document.getElementById('btn-back').style.display=show?'':'none'}
function setContent(html){document.getElementById('content').innerHTML=html}
function showUpdating(show){document.getElementById('updating-bar').classList.toggle('show',show)}
function showSaving(show){document.getElementById('saving-bar').classList.toggle('show',show)}
function showToast(msg,color='#1D9E75'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=color;
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);
}
function setActiveTab(tab){
  document.getElementById('tab-home').classList.toggle('active',tab==='home');
  document.getElementById('tab-trade').classList.toggle('active',tab==='trade');
}

// ---- API ----
async function apiGet(p){const r=await fetch(GAS_URL+'?'+new URLSearchParams(p));return r.json()}
async function apiPost(b){const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(b)});return r.json()}

// ---- ナビ ----
function showHome(){
  screen='home';currentDan=null;currentItem=null;
  homeSearchQuery='';
  const inp=document.getElementById('global-search');
  if(inp) inp.placeholder='アイテムを検索...';
  setActiveTab('home');renderHome();
}
function showDan(danId){
  screen='dan';currentDan=danId;currentItem=null;danSearchQuery='';
  renderDan(danId);
}
function showItem(danId,item){
  screen='item';currentDan=danId;currentItem=item;
  editCounts={アクセ:item.アクセ,トップス:item.トップス,ボトムス:item.ボトムス,シューズ:item.シューズ};
  renderItem(item);
}
async function goBack(){
  if(screen==='imgpreview'){
    window._imgPreviewBack=false;
    document.getElementById('bottombar').style.display='';
    showTrade();
    return;
  }
  if(screen==='item'){
    if(isSaving) await savingPromise;
    const dan=currentDan;
    screen='dan';currentDan=dan;currentItem=null;
    setTitle(dan);setBack(true);
    if(itemsCache[dan]) renderItemList(dan);
    else renderDan(dan);
  } else if(screen==='dan'){
    showHome();
  } else if(screen==='trade'){
    showHome();
  }
}
function reloadCurrent(){
  if(screen==='home'){dansCache=null;lsDel('dans');renderHome();}
  else if(screen==='dan'){delete itemsCache[currentDan];lsDel('items_'+currentDan);showDan(currentDan);}
  else if(screen==='item'){showItem(currentDan,currentItem);}
  else if(screen==='trade'){showTrade();}
}

// ---- 自動保存（キュー方式：常に最新値を1回だけ送る） ----
let saveQueue=null;   // 次に送る予定の内容
let saveLock=false;   // 通信中フラグ
let saveTimer=null;

function scheduleAutoSave(){
  // 最新のeditCountsを予約。通信中でも上書きするので常に最新値になる
  saveQueue={dan:currentDan,itemId:currentItem.id,...editCounts};
  if(!saveLock) flushSaveQueue();
}

async function flushSaveQueue(){
  if(!saveQueue||saveLock) return;
  saveLock=true;
  showSaving(true);

  // 通信開始時点の最新値を取り出す
  const payload={action:'saveItem',...saveQueue};
  const snapItem=currentItem ? {...currentItem} : null;
  const snapDan=currentDan;
  saveQueue=null; // 取り出したのでクリア

  const res=await apiPost(payload).catch(()=>null);
  saveLock=false;

  if(res&&res.success){
    // キャッシュ更新
    const cached=itemsCache[snapDan];
    if(cached){
      const idx=cached.findIndex(i=>i.id===payload.itemId);
      if(idx>=0){
        Object.assign(cached[idx],{アクセ:payload.アクセ,トップス:payload.トップス,ボトムス:payload.ボトムス,シューズ:payload.シューズ});
        lsSet('items_'+snapDan,cached);
      }
    }
    if(currentItem&&currentItem.id===payload.itemId){
      currentItem={...currentItem,アクセ:payload.アクセ,トップス:payload.トップス,ボトムス:payload.ボトムス,シューズ:payload.シューズ};
    }
    dansCache=null;lsDel('dans');
    showToast('✓ 保存しました');
  } else {
    showToast('保存に失敗しました','#e24b4a');
  }

  // 通信中に新しい変更があればすぐ再送
  if(saveQueue) flushSaveQueue();
  else showSaving(false);
}

function fmtPct(r){return Math.round(r*10)/10}

// ---- HOME（全検索つき） ----
function renderHome(){
  setTitle('アイプリ管理');setBack(false);setActiveTab('home');
  const allItems=getAllItems();
  const q=normalize(homeSearchQuery);
  // 検索バー
  // 固定検索バーを表示してバインド
  const sb=document.getElementById('search-bar');
  sb.style.display='';
  const inp=document.getElementById('global-search');
  inp.value=homeSearchQuery;
  inp.oninput=e=>{homeSearchQuery=e.target.value;renderHomeSearch();};

  if(q && allItems.length>0){
    const filtered=allItems.filter(({item})=>normalize(item.name).includes(q)||normalize(item.id).includes(q));
    const rows=filtered.length===0
      ? '<div class="trade-empty">該当するアイテムがありません</div>'
      : filtered.map(({danId,item})=>itemRowHTML(danId,item,true)).join('');
    setContent(`<div class="item-list">${rows}</div>`);
  } else if(!dansCache){
    setContent('<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>');
    loadDans();
    return;
  } else {
    const cards=dansCache.map(d=>{
      const pct=fmtPct(d.rate??(d.total?d.owned/d.total*100:0));
      return `<div class="dan-card" onclick="showDan('${d.id}')">
        <div class="dan-img"><img src="${d.image||''}" alt="${d.id}" loading="lazy" onerror="this.style.display='none'"></div>
        <div class="dan-footer">
          <div class="dan-name">${d.id}</div>
          <div class="dan-meta">${d.owned??0} / ${d.total??0}（${pct}%）</div>
          <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');
    setContent(`<div class="dan-grid">${cards}</div>`);
  }
}

function renderHomeSearch(){
  const q=normalize(homeSearchQuery);
  const allItems=getAllItems();
  const list=document.querySelector('.item-list')||document.querySelector('.dan-grid');
  const container=document.getElementById('content');
  if(q){
    const filtered=allItems.filter(({item})=>normalize(item.name).includes(q)||normalize(item.id).includes(q));
    const rows=filtered.length===0
      ? '<div class="trade-empty">該当するアイテムがありません</div>'
      : filtered.map(({danId,item})=>itemRowHTML(danId,item,true)).join('');
    const newList=document.createElement('div');
    newList.className='item-list';
    newList.innerHTML=rows;
    if(list) list.replaceWith(newList);
    else container.appendChild(newList);
  } else {
    // 検索クリア→弾グリッドに戻す
    if(!dansCache){loadDans();return;}
    const cards=dansCache.map(d=>{
      const pct=fmtPct(d.rate??(d.total?d.owned/d.total*100:0));
      return `<div class="dan-card" onclick="showDan('${d.id}')">
        <div class="dan-img"><img src="${d.image||''}" alt="${d.id}" loading="lazy" onerror="this.style.display='none'"></div>
        <div class="dan-footer">
          <div class="dan-name">${d.id}</div>
          <div class="dan-meta">${d.owned??0} / ${d.total??0}（${pct}%）</div>
          <div class="pct-bar"><div class="pct-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }).join('');
    const newGrid=document.createElement('div');
    newGrid.className='dan-grid';
    newGrid.innerHTML=cards;
    if(list) list.replaceWith(newGrid);
    else container.appendChild(newGrid);
  }
}

async function loadDans(){
  const cached=lsGet('dans');
  if(cached){
    dansCache=cached;renderHome();
    showUpdating(true);
    apiGet({action:'getDans'}).then(res=>{
      showUpdating(false);
      if(res&&!res.error){dansCache=res.dans;lsSet('dans',dansCache);if(screen==='home')renderHome();}
    }).catch(()=>showUpdating(false));
    return;
  }
  const res=await apiGet({action:'getDans'}).catch(()=>null);
  if(!res||res.error){
    setContent('<div class="error-box">データを取得できませんでした。</div>');return;
  }
  dansCache=res.dans;lsSet('dans',dansCache);renderHome();
}

function getAllItems(){
  const result=[];
  if(!itemsCache) return result;
  Object.entries(itemsCache).forEach(([danId,items])=>{
    (items||[]).forEach(item=>result.push({danId,item}));
  });
  return result;
}

function itemRowHTML(danId,item,showDanLabel=false){
  const complete=PARTS.every(p=>item[p]>0);
  const chips=PARTS.map(p=>{
    const v=item[p];
    const cls=v===0?'zero':v>1?'extra':'has';
    return `<span class="part-chip ${cls}">${p}: ${v}</span>`;
  }).join('');
  const danLabel=showDanLabel?`<div style="font-size:11px;color:#9ca3af;margin-bottom:2px">${danId}</div>`:'';
  return `<div class="item-row ${complete?'complete':''}" onclick="openItem('${danId}','${item.id}')">
    <div class="item-thumb"><img src="${item.image||''}" alt="${item.name}" loading="lazy"
      onerror="this.parentElement.innerHTML='<div class=no-img><i class=ti ti-photo-off></i></div>'"></div>
    <div class="item-info">
      ${danLabel}
      <div class="item-name-row"><span class="heart">♡</span><span class="item-iname">${item.name}</span></div>
      <div class="parts-row">${chips}</div>
    </div>
    <i class="ti ti-chevron-right" style="color:#f9a8d4;font-size:16px;flex-shrink:0"></i>
  </div>`;
}

// ---- DAN ----
function renderItemList(danId){
  const q=normalize(danSearchQuery);
  const items=(itemsCache[danId]||[]).filter(item=>!q||normalize(item.name).includes(q)||normalize(item.id).includes(q));
  // 固定検索バーをDAN用に切り替え
  const sb=document.getElementById('search-bar');
  sb.style.display='';
  const inp=document.getElementById('global-search');
  inp.value=danSearchQuery;
  inp.placeholder='この弾を検索...';
  inp.oninput=e=>{
    danSearchQuery=e.target.value;
    const q2=normalize(danSearchQuery);
    const items2=(itemsCache[danId]||[]).filter(item=>!q2||normalize(item.name).includes(q2)||normalize(item.id).includes(q2));
    const list=document.querySelector('.item-list');
    if(list) list.innerHTML=items2.length===0
      ? '<div class="trade-empty">該当するアイテムがありません</div>'
      : items2.map(item=>itemRowHTML(danId,item,false)).join('');
  };
  const rows=items.length===0
    ? '<div class="trade-empty">該当するアイテムがありません</div>'
    : items.map(item=>itemRowHTML(danId,item,false)).join('');
  document.getElementById('content').innerHTML=`<div class="item-list">${rows}</div>`;
}

async function renderDan(danId){
  setTitle(danId);setBack(true);
  if(!itemsCache[danId]){
    const cached=lsGet('items_'+danId);
    if(cached){
      itemsCache[danId]=cached;renderItemList(danId);
      showUpdating(true);
      apiGet({action:'getItems',dan:danId}).then(res=>{
        showUpdating(false);
        if(res&&!res.error){itemsCache[danId]=res.items;lsSet('items_'+danId,res.items);if(screen==='dan'&&currentDan===danId)renderItemList(danId);}
      }).catch(()=>showUpdating(false));
      return;
    }
    setContent('<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>');
    const res=await apiGet({action:'getItems',dan:danId}).catch(()=>null);
    if(!res||res.error){setContent('<div class="error-box">データを取得できませんでした。</div>');return;}
    itemsCache[danId]=res.items;lsSet('items_'+danId,res.items);
  }
  renderItemList(danId);
}

function openItem(danId,itemId){
  // どの階層からでも詳細に飛べる
  if(!itemsCache[danId]){
    // キャッシュがない場合は読み込んでから
    apiGet({action:'getItems',dan:danId}).then(res=>{
      if(res&&!res.error){itemsCache[danId]=res.items;lsSet('items_'+danId,res.items);}
      const item=(itemsCache[danId]||[]).find(i=>i.id===itemId);
      if(item) showItem(danId,item);
    });
    return;
  }
  const item=(itemsCache[danId]||[]).find(i=>i.id===itemId);
  if(item) showItem(danId,item);
}

// ---- ITEM DETAIL ----
function renderItem(item){
  setTitle(currentDan);setBack(true);
  document.getElementById('search-bar').style.display='none';
  const partRows=PARTS.map(p=>`
    <div class="part-row">
      <div class="part-label">${p}<span>*</span></div>
      <div class="counter">
        <button class="cnt-btn" onclick="adj('${p}',-1)"><i class="ti ti-minus"></i></button>
        <span class="cnt-val" id="cnt-${p}">${editCounts[p]}</span>
        <button class="cnt-btn" onclick="adj('${p}',1)"><i class="ti ti-plus"></i></button>
      </div>
    </div>`).join('');
  setContent(`
    <div class="detail-header">
      <img class="detail-img" src="${item.image||''}" alt="${item.name}" onerror="this.style.display='none'">
      <div class="detail-name"><span>♡</span>${item.name}</div>
    </div>${partRows}`);
}
function adj(part,delta){
  editCounts[part]=Math.max(0,(editCounts[part]||0)+delta);
  const el=document.getElementById('cnt-'+part);
  if(el) el.textContent=editCounts[part];
  scheduleAutoSave();
}

// ---- 交換リスト ----
function getTradeItems(){
  const result=[];
  Object.entries(itemsCache).forEach(([danId,items])=>{
    (items||[]).forEach(item=>{
      const extras=PARTS.filter(p=>item[p]>1);
      if(extras.length>0) result.push({danId,item,extras});
    });
  });
  return result;
}

async function showTrade(){
  screen='trade';currentDan=null;currentItem=null;
  setTitle('交換リスト');setBack(false);setActiveTab('trade');
  document.getElementById('search-bar').style.display='none';
  // 未読み込みの弾を全部読み込む
  if(dansCache){
    const missing=dansCache.filter(d=>!itemsCache[d.id]);
    if(missing.length>0){
      setContent('<div class="loading"><div class="spinner"></div><span>データ読み込み中...</span></div>');
      await Promise.all(missing.map(async d=>{
        const c=lsGet('items_'+d.id);
        if(c){itemsCache[d.id]=c;return;}
        const res=await apiGet({action:'getItems',dan:d.id}).catch(()=>null);
        if(res&&!res.error){itemsCache[d.id]=res.items;lsSet('items_'+d.id,res.items);}
      }));
    }
  }
  renderTradeList();
}

function renderTradeList(){
  const allTrades=getTradeItems();
  const danIds=[...new Set(allTrades.map(t=>t.danId))];
  const trades=tradeFilter==='all'?allTrades:allTrades.filter(t=>t.danId===tradeFilter);

  // フィルターボタン
  const filterBtns=[
    `<button class="filter-btn ${tradeFilter==='all'?'active':''}" onclick="setTradeFilter('all')">すべて</button>`,
    ...danIds.map(d=>`<button class="filter-btn ${tradeFilter===d?'active':''}" onclick="setTradeFilter('${d}')">${d}</button>`)
  ].join('');

  const exportBtn=`<button class="trade-export-btn" onclick="exportTradeImage()"><i class="ti ti-download" style="font-size:14px"></i> 画像保存</button>`;
  const header=`<div class="trade-header"><div class="trade-title">交換（${trades.length}件）</div>${exportBtn}</div>`;
  const filters=`<div class="filter-row">${filterBtns}</div>`;

  const rows=trades.length===0
    ? '<div class="trade-empty">余っているアイテムはありません</div>'
    : trades.map(({danId,item,extras})=>{
        const chips=extras.map(p=>`<span class="trade-chip">${p} +${item[p]-1}</span>`).join('');
        return `<div class="trade-item" onclick="openItem('${danId}','${item.id}')">
          <div class="trade-thumb"><img src="${item.image||''}" alt="${item.name}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=no-img><i class=ti ti-photo-off></i></div>'"></div>
          <div class="trade-info">
            <div class="trade-name">${item.name}</div>
            <div class="trade-dan">${danId}</div>
            <div class="trade-parts">${chips}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:#fde68a;font-size:16px;flex-shrink:0"></i>
        </div>`;
      }).join('');

  setContent(`<div id="trade-content">${header}${filters}${rows}</div>`);
}

function setTradeFilter(danId){
  tradeFilter=danId;
  renderTradeList();
}

// ---- 画像保存（GASプロキシ経由でCORS回避） ----
const imgCache={};
async function imgToBase64(url){
  if(!url) return null;
  if(imgCache[url]) return imgCache[url];
  try{
    const res=await fetch(GAS_URL+'?'+new URLSearchParams({action:'proxyImage',url}));
    const data=await res.json();
    if(!data.b64) return null;
    const dataUrl='data:'+data.mime+';base64,'+data.b64;
    imgCache[url]=dataUrl;
    return dataUrl;
  }catch(e){return null;}
}

async function exportTradeImage(){
  const allTrades=getTradeItems();
  const trades=tradeFilter==='all'?allTrades:allTrades.filter(t=>t.danId===tradeFilter);
  if(trades.length===0){showToast('交換アイテムがありません','#e24b4a');return;}

  // ローディング表示
  const overlay=document.createElement('div');
  overlay.id='export-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
  overlay.innerHTML='<div class="spinner"></div><div style="font-size:14px;color:#f472b6;font-weight:500">画像を生成中...</div>';
  document.body.appendChild(overlay);

  try{
    // 全画像を並列取得
    await Promise.all(trades.map(({item})=>imgToBase64(item.image||'')));

    // Canvas描画（2列グリッド）
    const COLS=2,THUMB=48,PAD=12,GAP=8,CARD_W=172,CARD_H=110,W=376;
    const rows=Math.ceil(trades.length/COLS);
    const H=PAD*2+28+rows*(CARD_H+GAP);
    const canvas=document.createElement('canvas');
    canvas.width=W*2;canvas.height=H*2;
    const ctx=canvas.getContext('2d');
    ctx.scale(2,2);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

    // タイトル
    ctx.fillStyle='#f472b6';ctx.font='bold 15px sans-serif';
    ctx.fillText('交換リスト（'+trades.length+'件）',PAD,PAD+15);

    for(let i=0;i<trades.length;i++){
      const {danId,item,extras}=trades[i];
      const col=i%COLS;
      const row=Math.floor(i/COLS);
      const x=PAD+col*(CARD_W+GAP);
      const y=PAD+28+row*(CARD_H+GAP);

      // カード背景
      ctx.fillStyle='#fffbeb';
      roundRect(ctx,x,y,CARD_W,CARD_H,8);ctx.fill();
      ctx.strokeStyle='#fde68a';ctx.lineWidth=1;
      roundRect(ctx,x,y,CARD_W,CARD_H,8);ctx.stroke();

      // サムネイル（左側中央）
      const b64=imgCache[item.image||''];
      const ix=x+6,iy=y+(CARD_H-THUMB)/2;
      if(b64){
        const img=new Image();
        await new Promise(r=>{img.onload=r;img.onerror=r;img.src=b64;});
        ctx.save();
        roundRect(ctx,ix,iy,THUMB,THUMB,6);ctx.clip();
        ctx.drawImage(img,ix,iy,THUMB,THUMB);
        ctx.restore();
      } else {
        ctx.fillStyle='#fdf2f8';
        roundRect(ctx,ix,iy,THUMB,THUMB,6);ctx.fill();
      }

      // テキスト（右側）
      const tx=x+6+THUMB+7;
      const maxW=CARD_W-THUMB-20;
      ctx.fillStyle='#9ca3af';ctx.font='9px sans-serif';
      ctx.fillText(danId,tx,y+14);
      ctx.fillStyle='#374151';ctx.font='bold 11px sans-serif';
      // 名前を最大幅で折り返し
      const words=item.name;
      let line='',ty=y+27;
      for(const ch of words){
        if(ctx.measureText(line+ch).width>maxW){
          ctx.fillText(line,tx,ty);ty+=14;line=ch;
        } else { line+=ch; }
      }
      ctx.fillText(line,tx,ty);

      // パーツチップ（下部）
      let cx=x+6,cy=y+CARD_H-22;
      for(const p of extras){
        const label=p+' +'+(item[p]-1);
        ctx.font='9px sans-serif';
        const tw=ctx.measureText(label).width;
        if(cx+tw+12>x+CARD_W-4){cx=x+6;cy-=16;}
        ctx.fillStyle='#fef3c7';
        roundRect(ctx,cx,cy,tw+10,14,4);ctx.fill();
        ctx.fillStyle='#92400e';
        ctx.fillText(label,cx+5,cy+10);
        cx+=tw+14;
      }
    }

    const dataUrl=canvas.toDataURL('image/jpeg',0.92);
    document.getElementById('export-overlay')?.remove();

    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){
      showImagePreview(dataUrl);
    } else {
      const a=document.createElement('a');
      a.download='交換リスト.jpg';a.href=dataUrl;a.click();
      showToast('✓ 画像を保存しました');
    }
  } catch(e){
    document.getElementById('export-overlay')?.remove();
    showToast('生成に失敗しました','#e24b4a');
  }
}

function showImagePreview(dataUrl){
  screen='imgpreview';
  setTitle('画像を保存');setBack(true);
  document.getElementById('search-bar').style.display='none';
  document.getElementById('bottombar').style.display='none';
  // 戻るボタンで交換リストに戻る
  const origGoBack=goBack;
  setContent(`<div class="img-preview">
    <div class="img-preview-hint">
      <strong>画像を長押し</strong> して<br>「写真に追加」または「画像を保存」を選んでください
    </div>
    <img src="${dataUrl}" alt="交換リスト">
    <button onclick="showTrade()" style="width:100%;background:#f472b6;color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer">
      <i class="ti ti-arrow-left"></i> 交換リストに戻る
    </button>
  </div>`);
}


function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ---- 起動 ----
// 初回起動時に全弾データをバックグラウンドでプリフェッチ
async function prefetchAll(){
  if(!dansCache) return;
  for(const d of dansCache){
    if(!itemsCache[d.id]){
      const c=lsGet('items_'+d.id);
      if(c){itemsCache[d.id]=c;continue;}
      const res=await apiGet({action:'getItems',dan:d.id}).catch(()=>null);
      if(res&&!res.error){itemsCache[d.id]=res.items;lsSet('items_'+d.id,res.items);}
    }
  }
}

async function init(){
  // dansキャッシュ読み込み
  const c=lsGet('dans');
  if(c) dansCache=c;
  showHome();
  // バックグラウンドで最新データ取得＋全弾プリフェッチ
  const res=await apiGet({action:'getDans'}).catch(()=>null);
  if(res&&!res.error){dansCache=res.dans;lsSet('dans',dansCache);}
  await prefetchAll();
}

init();
</script>
